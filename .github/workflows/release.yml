name: package_release

on:
    push:
        tags:
        - '*'

jobs:
#   gitleaks:
#     uses: ./.github/workflows/gitleaks.yml

#   linting:
#     uses: ./.github/workflows/linting.yml
#     needs: gitleaks

#   test:
#     uses: ./.github/workflows/test.yml
#     needs: linting

  release:
    runs-on: ubuntu-latest
    # needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
            auto-update-conda: true
            python-version: "3.11"
      - name: Upgrading pip
        run: python -m pip install --upgrade pip
      - name: Installing conda build
        run: conda install -y conda-build
      - name: Install dependencies
        run: |
          pip install "setuptools >= 64" "setuptools_scm[toml] >= 6.4" "wheel" anaconda-client anaconda-auth anaconda
      - name: Prepare Environment
        run: |
          echo "The ref name is ${{ github.ref_name }}"
          rm -rf dist
          rm -rf conda_receip
      - name: Build PyPi Package
        run: |
          python -m build
          python -m twine check dist/*
          twine upload -p ${{ secrets.TWINE_API_KEY }} dist/*
      - name: Build Conda Package
        run: |
          conda config --set anaconda_upload no
          conda-build conda_receip/ --package-format=tar.bz2 --output-folder dist
          anaconda -t ${{ secrets.ANACONDA_AUTH_API_KEY }} upload dist/noarch/sparkpolars-${{ github.ref_name }}-py_0.tar.bz2
      - name: Push file to GitHub Release
        run: |
          gh release upload ${{github.ref_name}} dist/sparkpolars-${{ github.ref_name }}.tar.gz
          gh release upload ${{github.ref_name}} dist/sparkpolars-${{ github.ref_name }}-py3-none-any.whl
          gh release upload ${{github.ref_name}} dist/noarch/sparkpolars-${{ github.ref_name }}-py_0.tar.bz2
        env:
            GITHUB_TOKEN: ${{ github.TOKEN }}