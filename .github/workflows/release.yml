name: ci

on:
    push:
        tags:
        - '*'

jobs:
#   gitleaks:
#     uses: ./.github/workflows/gitleaks.yml

#   linting:
#     uses: ./.github/workflows/linting.yml
#     needs: gitleaks

#   test:
#     uses: ./.github/workflows/test.yml
#     needs: linting

  release:
    runs-on: ubuntu-latest
    # needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
            auto-update-conda: true
            python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install '.[dev]' anaconda-client anaconda-auth anaconda
          conda install -y conda-build
      - name: Build and publish package
        run: |
          echo "The ref name is ${{ github.ref_name }}"
          rm -rf dist
          rm -rf conda_receip
          python -m build
          python -m twine check dist/*
          twine upload -p ${{ secrets.TWINE_API_KEY }} dist/*
          conda config --set anaconda_upload no
          conda-build conda_receip/ --package-format=tar.bz2 --output-folder dist
          anaconda -t ${{ secrets.ANACONDA_AUTH_API_KEY }} upload dist/noarch/sparkpolars-${{ github.ref_name }}-py_0.tar.bz2
          gh release upload ${{github.ref_name}} dist/sparkpolars-${{ github.ref_name }}.tar.gz
          gh release upload ${{github.ref_name}} dist/sparkpolars-${{ github.ref_name }}-py3-none-any.whl
          gh release upload ${{github.ref_name}} dist/noarch/sparkpolars-${{ github.ref_name }}-py_0.tar.bz2
        env:
            GITHUB_TOKEN: ${{ github.TOKEN }}